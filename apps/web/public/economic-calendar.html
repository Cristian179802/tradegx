<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #09090b; }
  </style>
</head>
<body>
  <div class="tradingview-widget-container" style="width:100%;height:100vh;">
    <div class="tradingview-widget-container__widget"></div>
    <script type="text/javascript"
      src="https://s3.tradingview.com/external-embedding/embed-widget-economic-calendar.js"
      async>
    {
      "colorTheme": "dark",
      "isTransparent": false,
      "width": "100%",
      "height": "100%",
      "locale": "en",
      "importanceFilter": "-1,0,1",
      "countryFilter": "us,eu,gb,de,fr,it,es,jp,cn,au,ca,nz,ch,sg,hk,br,mx,in,kr,za,tr,sa"
    }
    </script>
  </div>
</body>
</html>
